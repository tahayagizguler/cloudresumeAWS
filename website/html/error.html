<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0a;
            --accent: #2563EB;
            --accent-hover: #1d4ed8;
            --text: #ffffff;
            --text-muted: #6b7280;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated gradient background */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at 30% 20%, rgba(37, 99, 235, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(37, 99, 235, 0.05) 0%, transparent 50%);
            animation: gradientShift 10s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes gradientShift {
            0% { transform: scale(1) translateY(0); }
            100% { transform: scale(1.05) translateY(-20px); }
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px 20px;
        }

        .error-code {
            font-size: clamp(80px, 20vw, 140px);
            font-weight: 800;
            color: var(--accent);
            line-height: 1;
            margin-bottom: 20px;
            text-shadow: 0 0 60px rgba(37, 99, 235, 0.27);
            letter-spacing: -8px;
        }

        .error-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 16px;
        }

        .error-message {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 40px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .home-button {
            display: inline-block;
            border: 1px solid var(--accent);
            color: var(--text);
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            transition: background 0.2s ease, border-color 0.2s ease;
            cursor: pointer;
        }

        .home-button:hover {
            background: var(--accent);
            border-color: var(--accent);
        }

        .footer-credit {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        @media (max-width: 640px) {
            .error-code {
                letter-spacing: -4px;
            }
            .error-title {
                font-size: 20px;
            }
            .error-message {
                font-size: 13px;
            }
            .footer-credit {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="content">
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-message">Looks like this path doesn't exist. It may have been moved or deleted.</p>
        <a href="index.html" class="home-button">← Back to Home</a>
    </div>
    <div class="footer-credit">Powered by CloudFront · Lambda · DynamoDB</div>
</body>
</html>
